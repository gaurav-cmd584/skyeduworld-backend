<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sky Eduworld</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#eef2f7;
}

.app{
    display:flex;
    min-height:100vh;
}

.sidebar{
    width:260px;
    background:#071633;
    color:white;
    padding:20px;
}

.logo{
    font-size:26px;
    font-weight:bold;
    margin-bottom:30px;
}

.menu button{
    width:100%;
    padding:14px;
    margin-bottom:10px;
    border:none;
    border-radius:8px;
    background:#12366e;
    color:white;
    cursor:pointer;
    text-align:left;
}

.main{
    flex:1;
    padding:25px;
}

.topbar{
    background:white;
    padding:18px;
    border-radius:12px;
    margin-bottom:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.card{
    background:white;
    border-radius:12px;
    padding:20px;
}

.view{
    display:none;
}

.view.active{
    display:block;
}

.table-wrap{
    overflow:auto;
    margin-top:20px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th,td{
    border:1px solid #dbe2ea;
    padding:12px;
    text-align:left;
}

th{
    background:#f3f6fb;
}

.loading{
    padding:25px;
    text-align:center;
    color:#555;
}

input,select{
    padding:10px;
    border:1px solid #cfd8e3;
    border-radius:8px;
}

.btn{
    padding:10px 16px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.stat{
    background:white;
    border-radius:12px;
    padding:20px;
}

.stat h2{
    margin-top:10px;
}
</style>
</head>

<body>

<div class="app">

<div class="sidebar">

<div class="logo">Sky Eduworld</div>

<div class="menu">

<button onclick="showView('dashboard')">Dashboard</button>
<button onclick="showView('students')">Students</button>
<button onclick="showView('addstudent')">Add Student</button>
<button onclick="showView('fees')">Fee Management</button>
<button onclick="showView('feereceive')">Receive Fee</button>
<button onclick="showView('reports')">Reports</button>

</div>

</div>

<div class="main">

<div class="topbar">
<h2 id="page-title">Dashboard</h2>
<input type="text" placeholder="Search students...">
</div>

<!-- DASHBOARD -->
<div class="view active" id="view-dashboard">

<div class="grid">

<div class="stat">
<div>Total Students</div>
<h2 id="total-students">0</h2>
</div>

<div class="stat">
<div>Total Fees</div>
<h2 id="total-fees">₹0</h2>
</div>

<div class="stat">
<div>Received</div>
<h2 id="total-received">₹0</h2>
</div>

<div class="stat">
<div>Balance</div>
<h2 id="total-balance">₹0</h2>
</div>

</div>

</div>

<!-- STUDENTS -->
<div class="view" id="view-students">

<div class="card">

<h3>All Students</h3>

<div class="loading" id="students-loading">
Loading students...
</div>

<div class="table-wrap" id="students-table-wrap" style="display:none">

<table>

<thead>
<tr>
<th>Name</th>
<th>Father</th>
<th>Course</th>
<th>University</th>
<th>Mobile</th>
<th>Status</th>
<th>Balance</th>
</tr>
</thead>

<tbody id="students-table"></tbody>

</table>

</div>

</div>

</div>

<!-- ADD STUDENT -->
<div class="view" id="view-addstudent">

<div class="card">

<h3>Add Student</h3>

<br>

<div class="grid">
<input type="text" id="name" placeholder="Student Name">
<input type="text" id="father" placeholder="Father Name">
<input type="text" id="course" placeholder="Course">
<input type="text" id="university" placeholder="University">
<input type="text" id="mobile" placeholder="Mobile">
<input type="number" id="total_fee" placeholder="Total Fee">
</div>

<br>

<button class="btn" onclick="saveStudent()">Save Student</button>

</div>

</div>

<!-- FEES -->
<div class="view" id="view-fees">

<div class="card">
<h3>Fee Management</h3>
<br>
<p>Fee Management Loaded Successfully</p>
</div>

</div>

<!-- FEE RECEIVE -->
<div class="view" id="view-feereceive">

<div class="card">

<h3>Receive Fee</h3>

<br>

<div class="grid">

<select id="fee-student"></select>
<input type="number" id="paid-amount" placeholder="Paid Amount">
<select id="pay-mode">
<option>Cash</option>
<option>Online</option>
<option>UPI</option>
</select>

</div>

<br>

<button class="btn" onclick="receiveFee()">Receive Fee</button>

</div>

</div>

<!-- REPORTS -->
<div class="view" id="view-reports">

<div class="card">
<h3>Reports</h3>
<br>
<p>Reports Loaded Successfully</p>
</div>

</div>

</div>

</div>

<script>

const API_BASE='https://skyeduworld-backend.onrender.com/api';

let students=[];

function showView(id){

    document.querySelectorAll('.view').forEach(v=>{
        v.classList.remove('active');
    });

    document.getElementById('view-'+id).classList.add('active');

    document.getElementById('page-title').innerText=id.toUpperCase();

    if(id==='students') loadStudents();

    if(id==='dashboard') loadDashboard();

    if(id==='feereceive') loadStudentDropdown();
}

async function api(method,url,data=null){

    const opt={
        method,
        headers:{
            'Content-Type':'application/json'
        }
    };

    if(data){
        opt.body=JSON.stringify(data);
    }

    const res=await fetch(API_BASE+url,opt);

    return await res.json();
}

async function loadStudents(){

    document.getElementById('students-loading').style.display='block';
    document.getElementById('students-table-wrap').style.display='none';

    try{

        const data=await api('GET','/students');

        students=Array.isArray(data)?data:[];

        const tbody=document.getElementById('students-table');

        tbody.innerHTML='';

        students.forEach(s=>{

            const balance=(s.total_fee||0)-(s.paid||0);

            tbody.innerHTML+=`
            <tr>
                <td>${s.name||''}</td>
                <td>${s.father||''}</td>
                <td>${s.course||''}</td>
                <td>${s.university_name||''}</td>
                <td>${s.mobile||''}</td>
                <td>${s.status||''}</td>
                <td>₹ ${balance}</td>
            </tr>`;
        });

        document.getElementById('students-loading').style.display='none';
        document.getElementById('students-table-wrap').style.display='block';

    }catch(err){

        console.error(err);

        document.getElementById('students-loading').innerHTML='Failed to load students';
    }
}

async function saveStudent(){

    const body={
        name:document.getElementById('name').value,
        father:document.getElementById('father').value,
        course:document.getElementById('course').value,
        university_name:document.getElementById('university').value,
        mobile:document.getElementById('mobile').value,
        total_fee:parseFloat(document.getElementById('total_fee').value||0)
    };

    try{

        await api('POST','/students',body);

        alert('Student Added Successfully');

        loadStudents();

    }catch(err){

        console.error(err);
        alert('Failed To Add Student');
    }
}

async function loadStudentDropdown(){

    if(students.length===0){
        await loadStudents();
    }

    const select=document.getElementById('fee-student');

    select.innerHTML='';

    students.forEach(s=>{

        select.innerHTML+=`<option value="${s.id}">${s.name}</option>`;
    });
}

async function receiveFee(){

    const body={
        student_id:document.getElementById('fee-student').value,
        amount:document.getElementById('paid-amount').value,
        mode:document.getElementById('pay-mode').value
    };

    try{

        await api('POST','/fees',body);

        alert('Fee Received Successfully');

    }catch(err){

        console.error(err);

        alert('Fee Receive Failed');
    }
}

async function loadDashboard(){

    if(students.length===0){
        try{
            const data=await api('GET','/students');
            students=Array.isArray(data)?data:[];
        }catch(err){
            console.error(err);
        }
    }

    let totalFee=0;
    let totalPaid=0;

    students.forEach(s=>{
        totalFee+=(s.total_fee||0);
        totalPaid+=(s.paid||0);
    });

    document.getElementById('total-students').innerText=students.length;
    document.getElementById('total-fees').innerText='₹'+totalFee;
    document.getElementById('total-received').innerText='₹'+totalPaid;
    document.getElementById('total-balance').innerText='₹'+(totalFee-totalPaid);
}

loadDashboard();

</script>

</body>
</html>
